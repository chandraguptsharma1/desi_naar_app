<header class="nb">
  <div class="nb-inner">

    <!-- HAMBURGER (mobile only) -->
    <button class="nb-hamburger" (click)="toggleDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <!-- LOGO -->
    <div class="nb-logo" (click)="homePage()">DESI <span>NAAR</span></div>

    <!-- CENTER NAV (desktop) -->
    <nav class="nb-nav">
      <a class="nb-link" (click)="productpage()" [class.active]="activeRoute === 'products'">All</a>
      <a class="nb-link" (click)="newarrivalPage()" [class.active]="activeRoute === 'new_arrival'">New Arrival</a>
      <a class="nb-link" (click)="categorypage()" [class.active]="activeRoute === 'category'">Category</a>
      <a class="nb-link" (click)="collectionPage()" [class.active]="activeRoute === 'collection'">Collection</a>
      <a class="nb-link" (click)="contactus()" [class.active]="activeRoute === 'contact-us'">Contact Us</a>
      <a class="nb-link" (click)="aboutuspage()" [class.active]="activeRoute === 'about_us'">About Us</a>
    </nav>

    <!-- RIGHT ICONS -->
    <div class="nb-right">

      <!-- Social (desktop only) -->
      <div class="nb-social">
        <a class="nb-icon-btn" [href]="facebookUrl" target="_blank" title="Facebook">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" />
          </svg>
        </a>
        <a class="nb-icon-btn" [href]="instagramUrl" target="_blank" title="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
            <rect x="2" y="2" width="20" height="20" rx="5" />
            <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" />
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
          </svg>
        </a>
      </div>
      <div class="nb-divider"></div>

      <!-- Search -->
      <button class="nb-icon-btn" (click)="toggleSearch()" title="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>

      <!-- Account -->
      <button class="nb-icon-btn" (click)="Login()" title="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>

      <!-- Cart -->
      <button class="nb-icon-btn cart" (click)="cartPage()" title="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 01-8 0" />
        </svg>
        <div class="nb-cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</div>
      </button>

    </div>
  </div>
</header>

<!-- SEARCH OVERLAY -->
<div class="nb-search-overlay" *ngIf="isSearchOpen" (click)="closeSearchOnBackdrop($event)">
  <div class="nb-search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input #searchInput class="nb-search-input" type="text" placeholder="What are you looking for?"
      (keyup.enter)="onSearch()" (input)="searchQuery = searchInput.value" autofocus />
    <button class="nb-search-close" (click)="toggleSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>
</div>

<!-- MOBILE DRAWER -->
<div class="nb-drawer-overlay" *ngIf="isDrawerOpen">
  <div class="nb-drawer" [class.open]="isDrawerVisible">

    <div class="nb-drawer-header">
      <div class="nb-drawer-logo">DESI <span>NAAR</span></div>
      <button class="nb-drawer-close" (click)="toggleDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <nav class="nb-drawer-nav">
      <a class="nb-drawer-link" (click)="productpage(); toggleDrawer()">All</a>
      <a class="nb-drawer-link" (click)="newarrivalPage(); toggleDrawer()">New Arrival</a>
      <a class="nb-drawer-link" (click)="categorypage(); toggleDrawer()">Category</a>
      <a class="nb-drawer-link" (click)="collectionPage(); toggleDrawer()">Collection</a>
      <a class="nb-drawer-link" (click)="contactus(); toggleDrawer()">Contact Us</a>
      <a class="nb-drawer-link" (click)="aboutuspage(); toggleDrawer()">About Us</a>
    </nav>

    <div class="nb-drawer-social">
      <a class="nb-drawer-social-btn" [href]="instagramUrl" target="_blank" title="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" />
          <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" />
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
        </svg>
      </a>
      <a class="nb-drawer-social-btn" [href]="facebookUrl" target="_blank" title="Facebook">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" />
        </svg>
      </a>
      <a class="nb-drawer-social-btn" [href]="whatsappUrl" target="_blank" title="WhatsApp">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path
            d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />
        </svg>
      </a>
    </div>

  </div>
  <div class="nb-backdrop" (click)="toggleDrawer()"></div>
</div>
