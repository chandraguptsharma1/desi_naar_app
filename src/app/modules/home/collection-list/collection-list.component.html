<section class="cl-section">

  <!-- HEADER -->
  <div class="cl-header">
    <div class="cl-header-left">
      <div class="cl-eyebrow">Explore</div>
      <div class="cl-title">Shop by <em>Collection</em></div>
    </div>
    <div class="cl-view-all" (click)="goToCategory()">View All</div>
  </div>
  <div class="cl-divider"></div>

  <!-- GRID -->
  <div class="cl-grid">

    <div class="cl-card" *ngFor="let col of collections" (click)="productpage(col.name)">
      <div class="cl-img-wrap">
        <div class="img-skeleton" [class.hidden]="col.loaded">
          <div class="skeleton-icon"></div>
        </div>
        <img [src]="col.image" [alt]="col.name" loading="eager" (load)="col.loaded = true" (error)="col.loaded = true"
          [class.loaded]="col.loaded" />
        <div class="cl-img-tag">Festive 2025</div>
        <div class="cl-img-num">{{ col.number }}</div>
        <div class="cl-explore">Explore Collection →</div>
      </div>
      <div class="cl-card-info">
        <div class="cl-card-collection">Collection {{ col.number }}</div>
        <div class="cl-card-name">{{ col.name }}</div>
        <div class="cl-card-desc">{{ col.description }}</div>
        <div class="cl-card-footer">
          <span class="cl-card-count">{{ col.itemCount }} Pieces</span>
          <span class="cl-card-arrow">→</span>
        </div>
      </div>
    </div>

  </div>

</section>
