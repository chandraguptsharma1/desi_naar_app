<div class="pg">

    <!-- HERO -->
    <div class="na-hero">
        <div>
            <div class="na-eyebrow">Shop by</div>
            <div class="na-title">Collections</div>
        </div>
        <div class="na-hero-right">
            <div class="na-season">Festive 2025</div>

        </div>
    </div>

    <div class="cat-grid">
        <div class="cat-card" *ngFor="let cat of categories; let i = index; trackBy: trackByCollection">
            <div class="img-skeleton" [class.hidden]="cat.loaded">
                <div class="skeleton-icon"></div>
            </div>
            <img [src]="cat.image" [alt]="cat.name" [attr.loading]="i === 0 ? 'eager' : 'lazy'"
                [attr.fetchpriority]="i === 0 ? 'high' : 'auto'" decoding="async" (load)="cat.loaded = true"
                (error)="cat.loaded = true" [class.loaded]="cat.loaded" />
            <div class="cat-badge" *ngIf="cat.badge">{{ cat.badge }}</div>
            <div class="cat-count">{{ cat.itemCount }} Pieces</div>
            <div class="cat-overlay">
                <div class="cat-tag">Collection 0{{ i + 1 }}</div>
                <div class="cat-name">{{ cat.name }}</div>
                <div class="cat-desc">{{ cat.description }}</div>
                <button class="cat-btn" [routerLink]="['/collection', cat.slug]">Explore Collection</button>
            </div>
        </div>
    </div>

    <div class="bottom-strip">
        <span class="strip-text">Desi Naar</span>
        <div class="strip-line"></div>
        <span class="strip-text">Festive 2026</span>
    </div>

</div>
